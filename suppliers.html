<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>نافذة الموردين</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <h2>الوسيط الاقتصادي</h2>
            <span>النسخة الاحترافية</span>
        </div>

        <ul class="sidebar-menu">

            <li onclick="goToDashboard()">
                <i class="fas fa-home"></i>
                لوحة التحكم
            </li>

            <li onclick="goToAccounting()">
                <i class="fas fa-file-invoice-dollar"></i>
                الملف المحاسبي
            </li>

            <li class="active">
                <i class="fas fa-users"></i>
                الموردين
            </li>

            <li onclick="goToLegal()">
                <i class="fas fa-gavel"></i>
                القانوني
            </li>

            <li onclick="goToSupport()">
                <i class="fas fa-headset"></i>
                الاستشارات
            </li>

        </ul>

    </aside>


    <!-- Main -->
    <main class="main-content">

        <header class="dashboard-header">
            <h1>نافذة الموردين</h1>
        </header>

        <!-- Suppliers Section -->

        <section class="suppliers-section">

            <div class="suppliers-header">

                <h2>قائمة الموردين</h2>

                <button class="add-btn">
                    <i class="fas fa-plus"></i>
                    إضافة مورد
                </button>

            </div>

            <table class="suppliers-table">

                <thead>
                    <tr>
                        <th>رقم المورد</th>
                        <th>اسم المورد</th>
                        <th>رقم الهاتف</th>
                        <th>المنتج</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>01</td>
                        <td>شركة الإخلاص</td>
                        <td>0550123456</td>
                        <td>مواد غذائية</td>
                        <td class="paid">نشط</td>
                        <td>
                            <button class="delete-btn">حذف</button>
                        </td>
                    </tr>

                    <tr>
                        <td>02</td>
                        <td>مؤسسة النور</td>
                        <td>0660558899</td>
                        <td>معدات</td>
                        <td class="pending">غير نشط</td>
                        <td>
                            <button class="delete-btn">حذف</button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="javascript/script.js"></script>

</body>
</html>
